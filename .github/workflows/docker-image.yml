name: Docker Build & Push

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: [actions/checkout@v4](https://github.com)

    - name: Log in to Docker Hub
      uses: [docker/login-action@v3](https://github.com)
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push production image
      uses: [docker/build-push-action@v6](https://github.com/docker/build-push-action)
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/your-image-name:latest
