name: Docker Build & Push

on:
  workflow_run:
    workflows: [Test All Services]
    types:
    - completed
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Get short commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # -----------------------
      # Frontend
      # -----------------------
      - name: Build frontend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ steps.vars.outputs.sha_short }} ./frontend
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ steps.vars.outputs.sha_short }} ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ steps.vars.outputs.sha_short }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest

      # -----------------------
      # API Gateway
      # -----------------------
      - name: Build api-gateway
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:${{ steps.vars.outputs.sha_short }} ./services/api-gateway
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:${{ steps.vars.outputs.sha_short }} ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:${{ steps.vars.outputs.sha_short }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:latest

      # -----------------------
      # Coordinator Service
      # -----------------------
      - name: Build coordinator-service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/coordinator-service:${{ steps.vars.outputs.sha_short }} ./services/coordinator-service
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/coordinator-service:${{ steps.vars.outputs.sha_short }} ${{ secrets.DOCKERHUB_USERNAME }}/coordinator-service:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/coordinator-service:${{ steps.vars.outputs.sha_short }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/coordinator-service:latest

      # -----------------------
      # FAQ Service
      # -----------------------
      - name: Build faq-service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/faq-service:${{ steps.vars.outputs.sha_short }} ./services/faq-service
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/faq-service:${{ steps.vars.outputs.sha_short }} ${{ secrets.DOCKERHUB_USERNAME }}/faq-service:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/faq-service:${{ steps.vars.outputs.sha_short }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/faq-service:latest

      # -----------------------
      # Leave Service
      # -----------------------
      - name: Build leave-service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/leave-service:${{ steps.vars.outputs.sha_short }} ./services/leave-service
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/leave-service:${{ steps.vars.outputs.sha_short }} ${{ secrets.DOCKERHUB_USERNAME }}/leave-service:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/leave-service:${{ steps.vars.outputs.sha_short }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/leave-service:latest

      # -----------------------
      # Recruitment Service
      # -----------------------
      - name: Build recruitment-service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/recruitment-service:${{ steps.vars.outputs.sha_short }} ./services/recruitment-service
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/recruitment-service:${{ steps.vars.outputs.sha_short }} ${{ secrets.DOCKERHUB_USERNAME }}/recruitment-service:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/recruitment-service:${{ steps.vars.outputs.sha_short }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/recruitment-service:latest

      # -----------------------
      # Payroll Service
      # -----------------------
      - name: Build payroll-service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/payroll-service:${{ steps.vars.outputs.sha_short }} ./services/payroll-service
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/payroll-service:${{ steps.vars.outputs.sha_short }} ${{ secrets.DOCKERHUB_USERNAME }}/payroll-service:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/payroll-service:${{ steps.vars.outputs.sha_short }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/payroll-service:latest

      # -----------------------
      # Performance Service
      # -----------------------
      - name: Build performance-service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/performance-service:${{ steps.vars.outputs.sha_short }} ./services/performance-service
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/performance-service:${{ steps.vars.outputs.sha_short }} ${{ secrets.DOCKERHUB_USERNAME }}/performance-service:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/performance-service:${{ steps.vars.outputs.sha_short }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/performance-service:latest
