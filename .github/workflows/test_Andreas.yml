name: Docker Build & Push

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Get short commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # -----------------------
      # Frontend
      # -----------------------
      - name: Build frontend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ steps.vars.outputs.sha_short }} ./frontend
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ steps.vars.outputs.sha_short }} ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest

      - name: Push frontend image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ steps.vars.outputs.sha_short }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest

      # -----------------------
      # API Gateway
      # -----------------------
      - name: Build api-gateway image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:${{ steps.vars.outputs.sha_short }} ./services/api-gateway
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:${{ steps.vars.outputs.sha_short }} ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:latest

      - name: Push api-gateway image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:${{ steps.vars.outputs.sha_short }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:latest

      # -----------------------
      # Coordinator Service
      # -----------------------
      - name: Build coordinator-service image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/coordinator-service:${{ steps.vars.outputs.sha_short }} ./services/coordinator-service
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/coordinator-service:${{ steps.vars.outputs.sha_short }} ${{ secrets.DOCKERHUB_USERNAME }}/coordinator-service:latest

      - name: Push coordinator-service image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/coordinator-service:${{ steps.vars.outputs.sha_short }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/coordinator-service:latest

      # -----------------------
      # FAQ Service
      # -----------------------
      - name: Build faq-service image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/faq-service:${{ steps.vars.outputs.sha_short }} ./services/faq-service
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/faq-service:${{ steps.vars.outputs.sha_short }} ${{ secrets.DOCKERHUB_USERNAME }}/faq-service:latest

      - name: Push faq-service image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/faq-service:${{ steps.vars.outputs.sha_short }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/faq-service:latest

      # -----------------------
      # Leave Service
      # -----------------------
      - name: Build leave-service image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/leave-service:${{ steps.vars.outputs.sha_short }} ./services/leave-service
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/leave-service:${{ steps.vars.outputs.sha_short }} ${{ secrets.DOCKERHUB_USERNAME }}/leave-service:latest

      - name: Push leave-service image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/leave-service:${{ steps.vars.outputs.sha_short }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/leave-service:latest
